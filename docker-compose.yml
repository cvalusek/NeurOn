services:
  control-plane:
    build:
      context: ./control-plane
      dockerfile: Dockerfile
    image: neuron-control-plane:local
    env_file:
      - .env
    ports:
      - "${CONTROL_PLANE_PORT:-8090}:8090"
    volumes:
      - .:/workspace:ro
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=8090
      - SHARED_PASSWORD=${SHARED_PASSWORD:-dev-password}
      - COOKIE_SECRET=${COOKIE_SECRET:-dev-cookie-secret}
      - ADMIN_USERS=${ADMIN_USERS:-}
      - STORAGE_DRIVER=${STORAGE_DRIVER:-sqlite}
      - SQLITE_PATH=${SQLITE_PATH:-/app/data/neuron.db}
      - DATABASE_URL=${DATABASE_URL:-}
      - CAPACITY_TARGETS_FILE=${CAPACITY_TARGETS_FILE:-/workspace/control-plane/examples/capacity-targets.prefer-docker.json}
      - CAPACITY_TARGETS_JSON=${CAPACITY_TARGETS_JSON:-}
      - CAPACITY_TARGET_KEYS=${CAPACITY_TARGET_KEYS:-}
      - USE_FAKE_PROVIDER=${USE_FAKE_PROVIDER:-false}
      - RECONCILER_INTERVAL_SECONDS=${RECONCILER_INTERVAL_SECONDS:-15}
      - RESERVATION_STATUS_POLL_SECONDS=${RESERVATION_STATUS_POLL_SECONDS:-5}
      - ADMIN_STATUS_POLL_SECONDS=${ADMIN_STATUS_POLL_SECONDS:-10}
      - HEALTH_CHECK_TIMEOUT_SECONDS=${HEALTH_CHECK_TIMEOUT_SECONDS:-5}
      - HEALTH_CHECK_INTERVAL_SECONDS=${HEALTH_CHECK_INTERVAL_SECONDS:-15}
      - LITELLM_API_BASE_URL=${LITELLM_API_BASE_URL:-}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
      - LITELLM_TRAFFIC_POLL_SECONDS=${LITELLM_TRAFFIC_POLL_SECONDS:-60}
      - LITELLM_TRAFFIC_LOOKBACK_SECONDS=${LITELLM_TRAFFIC_LOOKBACK_SECONDS:-300}
      - AWS_REGION=${AWS_REGION:-us-east-1}
