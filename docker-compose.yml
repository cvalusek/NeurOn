services:
  neuron:
    build:
      context: ./control-plane
      dockerfile: Dockerfile
    image: neuron-control-plane:local
    container_name: neuron
    restart: on-failure
    env_file:
      - .env
    ports:
      - "${CONTROL_PLANE_PORT:-8090}:8090"
    volumes:
      - .:/workspace:ro
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=8090
      - STORAGE_DRIVER=${STORAGE_DRIVER:-sqlite}
      - LITELLM_API_BASE_URL=${LITELLM_API_BASE_URL:-}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
