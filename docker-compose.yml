services:
  neuron:
    build:
      context: ./control-plane
      dockerfile: Dockerfile
    image: neuron-control-plane:local
    container_name: neuron
    restart: on-failure
    env_file:
      - .env
    ports:
      - "${CONTROL_PLANE_PORT:-8090}:8090"
    volumes:
      - .:/workspace:ro
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=8090
      - STORAGE_DRIVER=${STORAGE_DRIVER:-sqlite}
      - LITELLM_API_BASE_URL=${LITELLM_API_BASE_URL:-}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
      - HASSLEOFF_URL=${HASSLEOFF_URL:-}
      - HASSLEOFF_CONTROLLER_TOKEN=${HASSLEOFF_CONTROLLER_TOKEN:-}
      - HASSLEOFF_CONTROLLER_ID=${HASSLEOFF_CONTROLLER_ID:-neuron-local}
      - HASSLEOFF_REQUEST_TIMEOUT_SECONDS=${HASSLEOFF_REQUEST_TIMEOUT_SECONDS:-5}
      - HASSLEOFF_FAILSAFE_TEST_TARGET_ID=${HASSLEOFF_FAILSAFE_TEST_TARGET_ID:-hassleoff-failsafe-test}

  hassleoff:
    profiles:
      - hassleoff
    build:
      context: ./hassleoff
      dockerfile: Dockerfile
    image: ${HASSLEOFF_IMAGE:-ghcr.io/cvalusek/hassleoff:latest}
    pull_policy: missing
    container_name: hassleoff
    restart: on-failure
    ports:
      - "${HASSLEOFF_HOST_PORT:-8091}:8091"
    volumes:
      - hassleoff-data:/app/data
      - ${HASSLEOFF_TARGETS_FILE_HOST:-./hassleoff/examples/targets.local.json}:/app/config/targets.json:ro
    environment:
      - PORT=8091
      - HASSLEOFF_CONTROLLER_TOKEN=${HASSLEOFF_CONTROLLER_TOKEN:-}
      - HASSLEOFF_SQLITE_PATH=${HASSLEOFF_SQLITE_PATH:-/app/data/hassleoff.db}
      - HASSLEOFF_TARGETS_FILE=/app/config/targets.json
      - HASSLEOFF_RUNPOD_API_KEY=${HASSLEOFF_RUNPOD_API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8091/readyz"]
      interval: 5s
      timeout: 2s
      retries: 20
      start_period: 5s

volumes:
  hassleoff-data:
