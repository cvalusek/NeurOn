name: Build NeurOn image

on:
  pull_request:
    paths:
      - "control-plane/**"
      - ".github/workflows/build-control-plane.yml"
  push:
    branches:
      - main
    paths:
      - "control-plane/**"
      - ".github/workflows/build-control-plane.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: control-plane/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: docker build -t neuron-control-plane .
